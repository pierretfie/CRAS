appId: com.cras.analytics
productName: CRAS
copyright: Copyright 2026 CRAS

directories:
  buildResources: build
  output: release

files:
  - "dist-electron/*.js"
  - "dist-electron/*.html"
  - "dist/client/**/*"
  - "package.json"

extraResources:
  - from: .env
    to: .env
  - from: release/server-single
    to: server
  - from: release/public
    to: public

asar: true

linux:
  target:
    - deb
    - AppImage
  category: Office
  syncDesktopName: true
  artifactName: "${productName}-${version}_${arch}.${ext}"

win:
  target:
    - nsis
  artifactName: "${productName}-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CRAS

publish:
  provider: github
  owner: pierretfie
  repo: CRAS
  releaseType: release
